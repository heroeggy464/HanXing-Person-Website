<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            height: fit-content;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .user-info {
            background: #ecf0f1;
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2c3e50;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #3498db;
            color: white;
        }
        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52,152,219,0.3);
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-google {
            background: #24292e;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 16px;
        }
        .btn-google:hover {
            background: #1a1e22;
            transform: translateY(-2px);
        }
        .btn-google i {
            margin-right: 10px;
        }
        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 8px;
            display: none;
        }
        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .resource-list {
            margin-top: 30px;
            border-top: 2px solid #ecf0f1;
            padding-top: 20px;
        }
        .resource-item {
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .resource-item .info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .resource-item .title {
            font-weight: 600;
        }
        .resource-item .category {
            font-size: 12px;
            color: #7f8c8d;
        }
        .resource-item .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .resource-item .actions a {
            color: #3498db;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .resource-item .actions a:hover {
            background: rgba(52,152,219,0.1);
        }
        .resource-item .delete-btn {
            color: #e74c3c;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            border: none;
            background: transparent;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        .resource-item .delete-btn:hover {
            background: rgba(231,76,60,0.1);
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #7f8c8d;
        }
        .empty-state i {
            font-size: 48px;
            color: #bdc3c7;
            margin-bottom: 10px;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .resource-item { flex-direction: column; align-items: flex-start; gap: 8px; }
            .resource-item .actions { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>
            <i class="fas fa-cog" style="color:#3498db;"></i>
            资源管理后台
        </h1>
        <p class="subtitle">添加或管理你的资源库</p>

        <!-- 用户信息 -->
        <div id="userInfo" class="user-info" style="display:none;">
            <span><i class="fas fa-user-circle"></i> <span id="userName">加载中...</span></span>
            <button class="btn btn-danger" onclick="logout()" style="padding:6px 16px;font-size:13px;">
                <i class="fas fa-sign-out-alt"></i> 退出
            </button>
        </div>

        <!-- 登录按钮 -->
        <div id="loginSection">
            <button class="btn btn-google" onclick="login()">
                <i class="fab fa-github"></i> 使用 GitHub 登录
            </button>
        </div>

        <!-- 资源管理表单 -->
        <div id="adminSection" style="display:none;">
            <form id="resourceForm">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> 分类</label>
                    <input type="text" id="category" placeholder="例如：通用资源、MC教程" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> 资源名称</label>
                    <input type="text" id="title" placeholder="例如：PingFang SC 字体" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> 描述</label>
                    <textarea id="description" placeholder="资源简短描述"></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-link"></i> 链接</label>
                    <input type="url" id="url" placeholder="https://example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-icons"></i> 图标（Font Awesome）</label>
                    <input type="text" id="icon" value="fa-link" placeholder="fa-link">
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> 添加资源
                </button>
            </form>

            <div id="message" class="message"></div>

            <!-- 已有资源列表 -->
            <div class="resource-list">
                <h3 style="margin-bottom:15px;color:#2c3e50;">
                    <i class="fas fa-list"></i> 已有资源
                </h3>
                <div id="resourceList">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置区域 - ⚠️ 请替换为你的实际信息
        // ============================================================
        const CONFIG = {
            // GitHub OAuth 信息
            clientId: '你的 Client ID',  // 从 GitHub OAuth App 获取
            
            // 回调地址（必须和 OAuth App 中设置的一致）
            redirectUri: 'https://你的用户名.github.io/仓库名/library/admin.html',
            
            // Cloudflare Worker 地址
            apiUrl: 'https://github-token-exchange.jsjsjzjiiiijjzn.workers.dev',
            
            // 仓库信息
            owner: '你的GitHub用户名',
            repo: '你的仓库名',
        };

        // ============================================================
        // 核心逻辑
        // ============================================================

        let accessToken = null;
        let userLogin = null;

        // 页面加载时检查 URL 参数
        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                // 有授权码，交换 token
                await exchangeToken(code);
                // 清除 URL 中的 code 参数
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                // 检查 localStorage 是否有 token
                const savedToken = localStorage.getItem('github_access_token');
                const savedUser = localStorage.getItem('github_user');
                if (savedToken && savedUser) {
                    accessToken = savedToken;
                    userLogin = savedUser;
                    showAdminPanel();
                } else {
                    showLoginButton();
                }
            }
        });

        // 登录：跳转到 GitHub 授权
        function login() {
            const authUrl = `https://github.com/login/oauth/authorize?client_id=${CONFIG.clientId}&redirect_uri=${CONFIG.redirectUri}&scope=user:email,repo`;
            window.location.href = authUrl;
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('github_access_token');
            localStorage.removeItem('github_user');
            accessToken = null;
            userLogin = null;
            showLoginButton();
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
        }

        // 用授权码换取 access_token（调用 Cloudflare Worker）
        async function exchangeToken(code) {
            try {
                const response = await fetch(CONFIG.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Token exchange failed');
                }

                const data = await response.json();
                accessToken = data.access_token;
                
                if (!accessToken) {
                    throw new Error('No access token received');
                }

                // 获取用户信息
                const userResponse = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                    },
                });
                const userData = await userResponse.json();
                userLogin = userData.login;

                // 保存到 localStorage
                localStorage.setItem('github_access_token', accessToken);
                localStorage.setItem('github_user', userLogin);

                showAdminPanel();
                showMessage('登录成功！', 'success');
            } catch (error) {
                console.error('Exchange token error:', error);
                showMessage('登录失败：' + error.message, 'error');
                showLoginButton();
            }
        }

        // 显示管理界面
        function showAdminPanel() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userName').textContent = userLogin;
            loadResources();
        }

        // 显示登录按钮
        function showLoginButton() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
        }

        // 显示消息
        function showMessage(text, type = 'success') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => {
                msg.className = 'message';
            }, 5000);
        }

        // ============================================================
        // 资源管理功能
        // ============================================================

        // 添加资源（创建 Issue）
        document.getElementById('resourceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!accessToken) {
                showMessage('请先登录', 'error');
                return;
            }

            const category = document.getElementById('category').value.trim();
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const url = document.getElementById('url').value.trim();
            const icon = document.getElementById('icon').value.trim() || 'fa-link';

            const issueBody = `
## 📌 ${category}

### ${title}
${description}

🔗 [访问链接](${url})

<!-- RESOURCE_DATA_START -->
{
  "category": "${category}",
  "title": "${title}",
  "description": "${description}",
  "url": "${url}",
  "icon": "${icon}"
}
<!-- RESOURCE_DATA_END -->
            `;

            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        title: `[资源] ${category} - ${title}`,
                        body: issueBody,
                        labels: ['资源分享']
                    })
                });

                if (response.ok) {
                    showMessage('✅ 资源添加成功！', 'success');
                    this.reset();
                    loadResources(); // 刷新列表
                } else {
                    const error = await response.json();
                    showMessage(`❌ 添加失败：${error.message}`, 'error');
                }
            } catch (error) {
                showMessage(`❌ 请求失败：${error.message}`, 'error');
            }
        });

        // 加载资源列表
        async function loadResources() {
            const container = document.getElementById('resourceList');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues?labels=资源分享&state=open&per_page=50`,
                    {
                        headers: accessToken ? {
                            'Authorization': `Bearer ${accessToken}`,
                        } : {},
                    }
                );

                if (!response.ok) throw new Error('Failed to load resources');

                const issues = await response.json();
                
                if (issues.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>暂无资源，添加第一个吧！</p>
                        </div>
                    `;
                    return;
                }

                // 解析资源数据
                const resources = [];
                issues.forEach(issue => {
                    const match = issue.body.match(/<!-- RESOURCE_DATA_START -->\s*(\{[\s\S]*?\})\s*<!-- RESOURCE_DATA_END -->/);
                    if (match) {
                        try {
                            const data = JSON.parse(match[1]);
                            data.issueNumber = issue.number;
                            resources.push(data);
                        } catch (e) {
                            console.warn('解析资源数据失败:', e);
                        }
                    }
                });

                if (resources.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-circle"></i>
                            <p>暂无有效资源数据</p>
                        </div>
                    `;
                    return;
                }

                // 渲染资源列表
                container.innerHTML = resources.map(res => `
                    <div class="resource-item">
                        <div class="info">
                            <span class="title"><i class="fas ${res.icon || 'fa-link'}"></i> ${res.title}</span>
                            <span class="category">📁 ${res.category} ${res.description ? '| ' + res.description : ''}</span>
                        </div>
                        <div class="actions">
                            <a href="${res.url}" target="_blank" title="访问链接">
                                <i class="fas fa-external-link-alt"></i>
                            </a>
                            <button class="delete-btn" onclick="deleteResource(${res.issueNumber})" title="删除">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                container.innerHTML = `<p style="color:#e74c3c;text-align:center;">❌ 加载失败：${error.message}</p>`;
            }
        }

        // 删除资源（关闭 Issue）
        async function deleteResource(issueNumber) {
            if (!confirm('确定要删除这个资源吗？')) return;
            if (!accessToken) {
                showMessage('请先登录', 'error');
                return;
            }

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues/${issueNumber}`,
                    {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            state: 'closed'
                        })
                    }
                );

                if (response.ok) {
                    showMessage('✅ 资源已删除', 'success');
                    loadResourc
