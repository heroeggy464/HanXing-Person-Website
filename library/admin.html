<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; }
        .user-info {
            background: #ecf0f1;
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #2c3e50; }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        textarea { resize: vertical; min-height: 80px; }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-google {
            background: #24292e;
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-google:hover { background: #1a1e22; }
        .btn-google i { margin-right: 10px; }
        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 8px;
            display: none;
        }
        .message.success { display: block; background: #d4edda; color: #155724; }
        .message.error { display: block; background: #f8d7da; color: #721c24; }
        .resource-list { margin-top: 30px; border-top: 2px solid #ecf0f1; padding-top: 20px; }
        .resource-item {
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .resource-item .info { flex: 1; }
        .resource-item .title { font-weight: 600; }
        .resource-item .category { font-size: 12px; color: #7f8c8d; }
        .resource-item .actions { display: flex; gap: 8px; }
        .resource-item .delete-btn {
            color: #e74c3c;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 16px;
        }
        .loading { text-align: center; padding: 20px; color: #7f8c8d; }
        .empty-state { text-align: center; padding: 30px; color: #7f8c8d; }
        .empty-state i { font-size: 48px; color: #bdc3c7; }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .resource-item { flex-direction: column; align-items: flex-start; gap: 8px; }
            .resource-item .actions { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-cog" style="color:#3498db;"></i> 资源管理后台</h1>
        <p class="subtitle">添加或管理你的资源库</p>

        <!-- 登录区域 -->
        <div id="loginSection">
            <button class="btn btn-google" onclick="doLogin()">
                <i class="fab fa-github"></i> 使用 GitHub 登录
            </button>
            <p id="loginStatus" style="margin-top:10px;color:#7f8c8d;font-size:14px;"></p>
        </div>

        <!-- 管理区域 -->
        <div id="adminSection" style="display:none;">
            <div class="user-info">
                <span><i class="fas fa-user-circle"></i> <span id="userName">用户</span></span>
                <button class="btn btn-danger" onclick="doLogout()" style="padding:6px 16px;font-size:13px;">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </button>
            </div>

            <form id="resourceForm">
                <div class="form-group">
                    <label>📁 分类</label>
                    <input type="text" id="category" placeholder="例如：通用资源、MC教程" required>
                </div>
                <div class="form-group">
                    <label>📝 资源名称</label>
                    <input type="text" id="title" placeholder="例如：PingFang SC 字体" required>
                </div>
                <div class="form-group">
                    <label>📄 描述</label>
                    <textarea id="description" placeholder="资源简短描述"></textarea>
                </div>
                <div class="form-group">
                    <label>🔗 链接</label>
                    <input type="url" id="url" placeholder="https://example.com" required>
                </div>
                <div class="form-group">
                    <label>🎨 图标（Font Awesome）</label>
                    <input type="text" id="icon" value="fa-link" placeholder="fa-link">
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> 添加资源
                </button>
            </form>

            <div id="message" class="message"></div>

            <div class="resource-list">
                <h3><i class="fas fa-list"></i> 已有资源</h3>
                <div id="resourceList"><div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔧 配置 - 请仔细检查这 4 项
        // ============================================================
        var CONFIG = {
            clientId: 'Ov23li2YlohHqBrWXaRk',
            redirectUri: 'https://heroeggy464.github.io/HanXing-Person-Website/library/admin.html',
            apiUrl: 'https://github-token-exchange.jsjsjzjiiiijjzn.workers.dev',
            owner: 'heroeggy464',
            repo: 'HanXing-Person-Website'
        };

        // ============================================================
        // 🚀 核心逻辑 - 和 test.html 完全一样
        // ============================================================

        var accessToken = null;
        var userLogin = null;

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            var urlParams = new URLSearchParams(window.location.search);
            var code = urlParams.get('code');

            if (code) {
                exchangeToken(code);
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                var savedToken = localStorage.getItem('github_access_token');
                var savedUser = localStorage.getItem('github_user');
                if (savedToken && savedUser) {
                    accessToken = savedToken;
                    userLogin = savedUser;
                    showAdminPanel();
                }
            }
        });

        // 登录函数 - 和 test.html 一模一样
        function doLogin() {
            var status = document.getElementById('loginStatus');
            status.textContent = '⏳ 正在跳转到 GitHub...';
            
            var authUrl = 'https://github.com/login/oauth/authorize?client_id=' + CONFIG.clientId + 
                          '&redirect_uri=' + CONFIG.redirectUri + 
                          '&scope=user:email,repo';
            
            setTimeout(function() {
                window.location.href = authUrl;
            }, 500);
        }

        function doLogout() {
            localStorage.removeItem('github_access_token');
            localStorage.removeItem('github_user');
            accessToken = null;
            userLogin = null;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminSection').style.display = 'none';
        }

        async function exchangeToken(code) {
            try {
                var response = await fetch(CONFIG.apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });

                var data = await response.json();
                accessToken = data.access_token;

                if (!accessToken) {
                    throw new Error('没有收到 access token');
                }

                var userRes = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                var userData = await userRes.json();
                userLogin = userData.login;

                localStorage.setItem('github_access_token', accessToken);
                localStorage.setItem('github_user', userLogin);

                showAdminPanel();
                showMessage('✅ 登录成功！欢迎 ' + userLogin, 'success');
            } catch (error) {
                showMessage('❌ 登录失败：' + error.message, 'error');
            }
        }

        function showAdminPanel() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('userName').textContent = userLogin;
            loadResources();
        }

        function showMessage(text, type) {
            var msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(function() { msg.className = 'message'; }, 5000);
        }

        // ============================================================
        // 📦 资源管理
        // ============================================================

        document.getElementById('resourceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!accessToken) { showMessage('请先登录', 'error'); return; }

            var category = document.getElementById('category').value.trim();
            var title = document.getElementById('title').value.trim();
            var description = document.getElementById('description').value.trim();
            var url = document.getElementById('url').value.trim();
            var icon = document.getElementById('icon').value.trim() || 'fa-link';

            var issueBody = '## 📌 ' + category + '\n\n### ' + title + '\n' + description + 
                            '\n\n🔗 [访问链接](' + url + ')\n\n<!-- RESOURCE_DATA_START -->\n' +
                            JSON.stringify({ category: category, title: title, description: description, url: url, icon: icon }) +
                            '\n<!-- RESOURCE_DATA_END -->';

            try {
                var response = await fetch('https://api.github.com/repos/' + CONFIG.owner + '/' + CONFIG.repo + '/issues', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: '[资源] ' + category + ' - ' + title,
                        body: issueBody,
                        labels: ['资源分享']
                    })
                });

                if (response.ok) {
                    showMessage('✅ 资源添加成功！', 'success');
                    document.getElementById('resourceForm').reset();
                    loadResources();
                } else {
                    var error = await response.json();
                    showMessage('❌ 添加失败：' + error.message, 'error');
                }
            } catch (error) {
                showMessage('❌ 请求失败：' + error.message, 'error');
            }
        });

        async function loadResources() {
            var container = document.getElementById('resourceList');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';

            try {
                var response = await fetch(
                    'https://api.github.com/repos/' + CONFIG.owner + '/' + CONFIG.repo + 
                    '/issues?labels=资源分享&state=open&per_page=50',
                    { headers: accessToken ? { 'Authorization': 'Bearer ' + accessToken } : {} }
                );

                if (!response.ok) throw new Error('加载失败');

                var issues = await response.json();

                if (issues.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无资源</p></div>';
                    return;
                }

                var resources = [];
                issues.forEach(function(issue) {
                    var match = issue.body.match(/<!-- RESOURCE_DATA_START -->\s*(\{[\s\S]*?\})\s*<!-- RESOURCE_DATA_END -->/);
                    if (match) {
                        try {
                            var data = JSON.parse(match[1]);
                            data.issueNumber = issue.number;
                            resources.push(data);
                        } catch (e) {}
                    }
                });

                if (resources.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>暂无有效资源</p></div>';
                    return;
                }

                var html = '';
                resources.forEach(function(res) {
                    html += '<div class="resource-item">' +
                        '<div class="info">' +
                            '<span class="title"><i class="fas ' + (res.icon || 'fa-link') + '"></i> ' + res.title + '</span>' +
                            '<span class="category">📁 ' + res.category + (res.description ? ' | ' + res.description : '') + '</span>' +
                        '</div>' +
                        '<div class="actions">' +
                            '<a href="' + res.url + '" target="_blank"><i class="fas fa-external-link-alt"></i></a>' +
                            '<button class="delete-btn" onclick="deleteResource(' + res.issueNumber + ')"><i class="fas fa-trash"></i></button>' +
                        '</div>' +
                    '</div>';
                });
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<p style="color:#e74c3c;">❌ ' + error.message + '</p>';
            }
        }

        async function deleteResource(issueNumber) {
            if (!confirm('确定要删除吗？')) return;
            if (!accessToken) { showMessage('请先登录', 'error'); return; }

            try {
                var response = await fetch(
                    'https://api.github.com/repos/' + CONFIG.owner + '/' + CONFIG.repo + '/issues/' + issueNumber,
                    {
                        method: 'PATCH',
                        headers: {
                            'Authorization': 'Bearer ' + accessToken,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ state: 'closed' })
                    }
                );

                if (response.ok) {
                    showMessage('✅ 已删除', 'success');
                    loadResources();
                } else {
                    var error = await response.json();
                    showMessage('❌ 删除失败：' + error.message, 'error');
                }
            } catch (error) {
                showMessage('❌ 请求失败：' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
