<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - 404错误</title>
    <!-- 引入与个人主页一致的图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 使用与个人主页完全一致的变量与风格 */
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --neutral-color: #ecf0f1;
            --text-color: #333;
            --light-text: #7f8c8d;
            --border-color: #ddd;
            --hover-color: #2980b9;
            --transition: all 0.3s ease;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --hover-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: var(--card-shadow);
            text-align: center;
            transition: var(--transition);
            animation: fadeInUp 0.8s ease forwards;
            position: relative;
            overflow: hidden;
        }

        .container:hover {
            box-shadow: var(--hover-shadow);
        }

        /* 顶部装饰线，与主页标题下划线一致 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), #5dade2);
            border-radius: 0 0 3px 3px;
        }

        .error-icon {
            font-size: 80px;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: inline-block;
            opacity: 0.8;
        }

        .error-code {
            font-size: 100px;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        }

        .error-title {
            font-size: 28px;
            color: var(--secondary-color);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .error-message {
            font-size: 1.05rem;
            color: var(--light-text);
            margin-bottom: 35px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }

        /* 按钮组 - 完全复用主页按钮样式 */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: var(--transition);
            cursor: pointer;
            box-shadow: var(--card-shadow);
            border: none;
        }

        .btn-solid {
            background: linear-gradient(135deg, var(--primary-color), #5dade2);
            color: white;
        }

        .btn-solid:hover {
            background: linear-gradient(135deg, var(--hover-color), #3498db);
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-outline:hover {
            background: rgba(52, 152, 219, 0.1);
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
        }

        /* 装饰性浮动元素（简化版，保持清爽） */
        .decoration {
            margin-top: 40px;
            color: var(--light-text);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .decoration span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            opacity: 0.7;
        }

        .decoration i {
            color: var(--primary-color);
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 35px 20px;
            }

            .error-code {
                font-size: 72px;
            }

            .error-title {
                font-size: 22px;
            }

            .error-message {
                font-size: 0.95rem;
            }

            .action-buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 260px;
                text-align: center;
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 图标：使用 Font Awesome 的 compass 或 question 图标 -->
        <div class="error-icon">
            <i class="fas fa-compass"></i>
        </div>

        <h1 class="error-code">404</h1>
        <h2 class="error-title">哎呀，页面走丢了</h2>
        <p class="error-message">
            您要找的页面可能已被移动、删除或暂时不可用。<br>
            别担心，试试下面的按钮回到安全地带。
        </p>

        <div class="action-buttons">
            <a href="https://heroeggy464.github.io/HanXing-Person-Website/library/index.html" class="btn btn-solid">
                <i class="fas fa-home"></i> 寒星的资源库
            </a>
            <a href="https://github.com/heroeggy464/HanXing-Person-Website" class="btn btn-outline">
                <i class="fab fa-github"></i> 仓库地址
            </a>
        </div>

        <div class="decoration">
            <span><i class="fas fa-code"></i> heroeggy464</span>
            <span><i class="fas fa-calendar-alt"></i> 2026</span>
            <span><i class="fas fa-map-signs"></i> HXPW 404 页面</span>
        </div>
    </div>
</body>
</html>
